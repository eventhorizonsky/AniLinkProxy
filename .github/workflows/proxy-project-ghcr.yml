name: proxy-project-ghcr

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - ".github/workflows/proxy-project-ghcr.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
          mkdir -p ../build
          rm -rf ../build/frontend-dist
          cp -r dist ../build/frontend-dist

      - name: Build backend
        working-directory: backend
        run: |
          # Build current package directory (supports multi-file backend layout)
          go mod tidy
          mkdir -p ../build
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../build/proxy-server .

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        run: |
          short_sha=$(git rev-parse --short HEAD)
          ts=$(date +"%Y%m%d-%H%M%S")
          echo "image=ghcr.io/${{ github.repository_owner }}/anilink-dandan-proxy" >> $GITHUB_OUTPUT
          echo "short_sha=$short_sha" >> $GITHUB_OUTPUT
          echo "ts=$ts" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:sha-${{ steps.tags.outputs.short_sha }}
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.ts }}-${{ steps.tags.outputs.short_sha }}
